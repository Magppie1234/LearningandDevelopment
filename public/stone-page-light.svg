<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <!-- Light marble slab for the page background (light theme). A hand-drawn
       vein network warped by fractal noise for organic, non-repeating marble
       movement (Calacatta-style: grey veins + warm taupe/gold accents on a
       warm off-white). Rendered as one cover slab, not tiled. -->
  <defs>
    <filter id="warp" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.014" numOctaves="2" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="30" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="warpFine" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="4" result="n2"/>
      <feDisplacementMap in="SourceGraphic" in2="n2" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0" intercept="1"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#F3EDE3"/>

  <!-- subtle broad stone shading -->
  <g filter="url(#soft)" fill="#c8bca7" opacity="0.10">
    <ellipse cx="300" cy="220" rx="520" ry="300"/>
    <ellipse cx="1250" cy="760" rx="560" ry="320"/>
  </g>

  <!-- primary veins (thicker, soft grey), warped organic -->
  <g filter="url(#warp)">
    <g filter="url(#soft)" fill="none" stroke-linecap="round">
      <path d="M-60 250 C 300 180, 520 360, 820 300 S 1300 250, 1680 370" stroke="#9a8d79" stroke-width="3.4" opacity="0.5"/>
      <path d="M-60 650 C 260 600, 520 730, 900 660 S 1360 640, 1680 710" stroke="#9a8d79" stroke-width="3" opacity="0.45"/>
      <path d="M-40 430 C 320 380, 540 505, 900 440 S 1340 420, 1680 490" stroke="#c2a878" stroke-width="2.6" opacity="0.34"/>
      <!-- branches -->
      <path d="M520 355 C 560 470, 690 520, 645 705" stroke="#9a8d79" stroke-width="2.1" opacity="0.4"/>
      <path d="M825 300 C 890 385, 845 505, 965 565" stroke="#9a8d79" stroke-width="1.9" opacity="0.38"/>
      <path d="M905 660 C 945 765, 1085 805, 1045 945" stroke="#9a8d79" stroke-width="1.8" opacity="0.36"/>
    </g>
  </g>

  <!-- hairline veins (finer warp), tighter organic wander -->
  <g filter="url(#warpFine)">
    <g filter="url(#soft)" fill="none" stroke-linecap="round" stroke="#877a67">
      <path d="M210 -30 C 265 200, 180 385, 300 565 S 360 865, 300 1040" stroke-width="1.1" opacity="0.34"/>
      <path d="M1210 -30 C 1165 225, 1285 425, 1180 645 S 1245 905, 1180 1040" stroke-width="1" opacity="0.32"/>
      <path d="M-40 860 C 300 820, 620 900, 980 850 S 1420 840, 1680 880" stroke-width="1" opacity="0.28"/>
    </g>
  </g>

  <!-- overall matte grain -->
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.03"/>
</svg>
