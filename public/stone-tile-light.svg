<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <!-- Subtle honed-stone grain for card surfaces (light theme). Transparent
       overlay meant to be blended (multiply) over the card's own color, so
       cards read like polished stone tiles rather than flat fills. -->
  <defs>
    <filter id="tclouds" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="3" seed="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0" intercept="1"/></feComponentTransfer>
    </filter>
    <filter id="tgrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" seed="9" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0" intercept="1"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="360" height="360" filter="url(#tclouds)" opacity="0.06"/>
  <rect width="360" height="360" filter="url(#tgrain)" opacity="0.03"/>
</svg>
